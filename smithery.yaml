# Smithery configuration for LetsFG MCP Server
# https://smithery.ai/docs/publishing

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      LETSFG_API_KEY:
        type: string
        description: "LetsFG Developer API key (prepaid credits). Get one free at letsfg.co/developers. Alternatively, use LETSFG_BEARER_TOKEN for the free PFS path."
      LETSFG_BEARER_TOKEN:
        type: string
        description: "LetsFG PFS Bearer token for free search. Get one via 'letsfg auth' (Twitter/X challenge flow, 90-day token). Not needed if LETSFG_API_KEY is set."
    required: []
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "letsfg-mcp"],
      env: {
        ...(config.LETSFG_API_KEY && { LETSFG_API_KEY: config.LETSFG_API_KEY }),
        ...(config.LETSFG_BEARER_TOKEN && { LETSFG_BEARER_TOKEN: config.LETSFG_BEARER_TOKEN })
      }
    })

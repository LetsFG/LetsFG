site_name: LetsFG Docs
site_url: https://letsfg.co/developers/docs
site_description: Agent-native flight search API. Free Bearer token search via letsfg.co — hundreds of airlines, zero markup, zero Playwright.
site_author: LetsFG

repo_url: https://github.com/LetsFG/LetsFG
repo_name: LetsFG/LetsFG

theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/favicon.png
  logo: assets/lfg_ban.png
  palette:
    - scheme: default
  font:
    text: Lexend
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Overview: index.md
  - Start Here:
    - Getting Started: getting-started.md
  - Public Developer API:
    - API Overview: api-guide.md
    - Onboarding & Billing: api-onboarding.md
    - Search & Results: api-search.md
    - Errors & Limits: api-errors.md
    - OpenAPI & Swagger: openapi.md
  - MCP & IDE Agents:
    - Packages & SDKs: packages.md
    - Claude Desktop: quickstart-claude.md
    - Cursor: quickstart-cursor.md
    - Windsurf: quickstart-windsurf.md
    - AI Agent Guide: agent-guide.md
  - Reference:
    - CLI Reference: cli-reference.md
    - Tutorials: tutorials.md
    - Architecture & Resilience: architecture-guide.md
    - Self-Hosting & HTTP Endpoints: self-hosting.md

extra:
  generator: false

extra_css:
  - assets/extra-20260519b.css

extra_javascript:
  - assets/domain-redirect.js

copyright: ""

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

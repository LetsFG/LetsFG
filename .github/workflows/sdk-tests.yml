name: Python SDK Tests

on:
  push:
    branches: [main]
    paths:
      - 'sdk/python/**'
      - '.github/workflows/sdk-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/python/**'
      - '.github/workflows/sdk-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SDK (no connector deps — browser binaries not available in CI)
        # --no-deps skips playwright / curl_cffi / httpx so the job stays fast.
        # pydantic is the only runtime dep needed by the masking models under test.
        run: pip install pydantic pytest && pip install -e . --no-deps
        working-directory: sdk/python
      - name: Run offer-masking tests
        # Connector tests require playwright browser binaries and curl_cffi C extensions
        # that are not available in standard GitHub Actions runners.
        # The masking layer (models/flights.py + local.py boundary) is fully covered here.
        run: python3 -m pytest tests/test_public_offer_masking.py -v
        working-directory: sdk/python
